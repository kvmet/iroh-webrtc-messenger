<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iroh Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      globalThis.addEventListener("TrunkApplicationStarted", () => {
        globalThis.wasmBindings.start_app();
      });
    </script>
    <style>
      html, body { height: 100dvh; margin: 0; overflow: hidden; }

      .aim-window {
        border: 2px solid;
        border-color: #ffffff #808080 #808080 #ffffff;
        box-shadow: 1px 1px 0 #000;
        background: #c0c0c0;
      }

      .aim-titlebar {
        background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
        color: #fff;
        font-size: 0.75rem;
        font-weight: bold;
        padding: 3px 8px;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .aim-btn {
        background: #c0c0c0;
        border: 2px solid;
        border-color: #ffffff #808080 #808080 #ffffff;
        padding: 5px 14px;
        font-size: 0.8125rem;
        cursor: pointer;
        min-width: 56px;
        font-family: inherit;
      }
      .aim-btn:hover:not(:disabled) { background: #d4d0c8; }
      .aim-btn:active:not(:disabled) {
        border-color: #808080 #ffffff #ffffff #808080;
      }
      .aim-btn:disabled { color: #808080; cursor: not-allowed; }

      .aim-input {
        border: 2px solid;
        border-color: #808080 #ffffff #ffffff #808080;
        background: white;
        padding: 2px 4px;
        font-size: 0.8125rem;
        font-family: inherit;
        outline: none;
        width: 100%;
        box-sizing: border-box;
      }
      .aim-input:focus { outline: 1px dotted #000; outline-offset: -3px; }

      .aim-inset {
        border: 2px solid;
        border-color: #808080 #ffffff #ffffff #808080;
        background: white;
      }

      .aim-buddy { padding: 1px 8px; font-size: 0.8125rem; cursor: default; }
      .aim-buddy:hover { background: #000080; color: white; }

      .aim-system-msg {
        color: #666;
        font-style: italic;
        font-size: 0.8125rem;
        padding: 1px 0;
      }

      .sender-me { font-weight: bold; color: #000080; }
      .sender-them { font-weight: bold; color: #8b0000; }

      .aim-chat-log {
        font-family: Arial, sans-serif;
        font-size: 0.875rem;
        line-height: 1.45;
      }

      .endpoint { overflow-wrap: anywhere; word-break: break-all; }

      .aim-section-label {
        font-size: 0.6875rem;
        font-weight: bold;
        text-transform: uppercase;
        color: #000080;
        border-bottom: 1px solid #808080;
        margin-bottom: 3px;
        padding-bottom: 1px;
      }
    </style>
  <link rel="modulepreload" href="/iroh-webrtc-messenger/iroh-webrtc-rust-browser-chat-room-eb9b5ff9db72713a.js" crossorigin="anonymous" integrity="sha384-waqxQgnaoN+s7rXhFS3245FnLFaalXsQMeJ+zA6iMoyeENz5M4u2xgebo+92FQAZ"><link rel="preload" href="/iroh-webrtc-messenger/iroh-webrtc-rust-browser-chat-room-eb9b5ff9db72713a_bg.wasm" crossorigin="anonymous" integrity="sha384-K0GThKG/jCC79PDMJRQupO0IrpzrQu3eIPIWEdCougkdHGGEodt/bV9AnlBqwiaD" as="fetch" type="application/wasm"></head>
  <body class="h-dvh overflow-hidden bg-[#c0c0c0]">
    <div id="app" class="h-full"></div>
  
<script type="module">
import init, * as bindings from '/iroh-webrtc-messenger/iroh-webrtc-rust-browser-chat-room-eb9b5ff9db72713a.js';
const wasm = await init({ module_or_path: '/iroh-webrtc-messenger/iroh-webrtc-rust-browser-chat-room-eb9b5ff9db72713a_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script></body>
</html>
